<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>

    <h1 class="titulo">Quadro Kanban</h1>

    <div class="controles">
        <button id="btnAdicionar">+ Nova Tarefa</button>
    </div>

    <div class="quadro">

        <div class="coluna" id="col-aFazer">
            <h2>A Fazer <span id="count-aFazer"></span></h2>
            <div class="cards" id="aFazer"></div>
        </div>

        <div class="coluna" id="col-fazendo">
            <h2>Fazendo <span id="count-fazendo"></span></h2>
            <div class="cards" id="fazendo"></div>
        </div>

        <div class="coluna" id="col-concluido">
            <h2>Concluído <span id="count-concluido"></span></h2>
            <div class="cards" id="concluido"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
